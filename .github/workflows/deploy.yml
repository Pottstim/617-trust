name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: debian
  VPS_PATH: /home/debian/617east
  DOCKER_COMPOSE_FILE: docker-compose.yml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./client
        run: bun install --frozen-lockfile

      - name: Build production bundle
        working-directory: ./client
        run: bun run build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la dist/
          echo "Total size: $(du -sh dist | cut -f1)"

      - name: Deploy to VPS via rsync
        uses: burnett01/rsync-deployments@7.0.0
        with:
          switches: -avz
          path: dist/
          remote_path: ${{ env.VPS_PATH }}/dist
          remote_host: ${{ env.VPS_HOST }}
          remote_user: ${{ env.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_key_pass: ${{ secrets.VPS_SSH_KEY_PASS }}

      - name: Restart nginx container on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          key_pass: ${{ secrets.VPS_SSH_KEY_PASS }}
          script: |
            cd ${{ env.VPS_PATH }}
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d --build --force-recreate
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} ps
            docker system prune -f --volumes 2>/dev/null || true